{% load static %}
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpensePRO Test</title>
    <link rel="stylesheet" href="{% static 'css/index.css' %}">
</head>

<header class="main-header">
    <nav class="navbar-container">
        <div class="nav-left">
            <a href="{% url 'home' %}" class="nav-logo">Home</a>
            <a href="#" class="nav-item">Dashboard</a>
            <a href="#" class="nav-item">History</a>
        </div>

        <div class="nav-right">
            {% if user.is_authenticated %}
                <span class="user-info">Welcome, {{ user.username }}!</span>
                <a href="{% url 'logout_user' %}" class="auth-btn">Logout</a>
            {% else %}
                <a href="{% url 'login_user' %}" class="auth-btn">
                    {{ "Login" }}
                </a>
            {% endif %}
        </div>
    </nav>
</header>

<body>
  {% block content %}
  {% endblock%}
</body>
</html>
